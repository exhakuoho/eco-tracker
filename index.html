<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a1a0f;
      color: #d4f5d4;
    }
    .center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      color: #4ade80;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }
    p {
      font-size: 1.1rem;
      color: #86efac;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="center">
    <h1>🌿 Eco Tracker</h1>
    <p>網站建置中，敬請期待。</p>
  </div>
</body>
</html>
